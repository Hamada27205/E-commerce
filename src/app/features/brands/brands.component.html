<section>
<div class="w-full bg-linear-to-r from-[#9333ea] via-[#a855f7] to-[#c084fc] py-10 px-6 md:px-16 text-white font-sans">
  <nav class="flex items-center space-x-2 text-xs md:text-sm mb-5 opacity-80">
    <a class="hover:text-white  text-dark-soft font-medium" routerLink="/">Home</a>
    <span class="opacity-60">/</span>
    <span class="font-medium">Brands</span>
  </nav>

  <div class="flex items-center gap-4 md:gap-6">
    <div class="shrink-0 flex items-center justify-center w-14 h-14 md:w-16 md:h-16 bg-white/20 backdrop-blur-md rounded-2xl border border-white/20 shadow-xl">
      <i class="fa-solid fa-tags text-2xl md:text-3xl text-white"></i>
    </div>

    <div class="flex flex-col">
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight">
        Top Brands
      </h1>
      <p class="text-sm md:text-base opacity-90 mt-1">
        Shop from your favorite brands
      </p>
    </div>
  </div>
</div>
<div class="mt-5 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4 mb-5">
  @for (brand of brandsList(); track brand._id) {
    <div class="bg-white rounded-xl p-3 shadow-md border border-gray-100 flex flex-col items-center group cursor-pointer transition-all duration-300 hover:-translate-y-2 hover:shadow-lg">
      
      <div class="w-full aspect-square overflow-hidden rounded-lg mb-3 bg-gray-50">
        <img
          [src]="brand.image"
          [alt]="brand.name"
          class="w-full h-full object-contain p-2 group-hover:scale-110 transition-transform duration-500"
        />
      </div>

      <h3 class="text-[#001d3d] text-lg font-semibold text-center truncate w-full transition-colors duration-300 group-hover:text-purple-500">
        {{ brand.name }}
      </h3>

      <div class="opacity-0 translate-y-1 transition-all duration-300 group-hover:opacity-100 group-hover:translate-y-0 flex items-center gap-1">
        <a [routerLink]="['/brands-details' , brand._id , brand.slug]" class="text-sm font-medium text-purple-500">View Products</a>
        <i class="fa-solid fa-arrow-right text-2xs text-purple-500"></i>
      </div>

    </div>
  }
</div>
</section>
