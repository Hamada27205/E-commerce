      <i class="fa-solid fa-box-open text-2xl md:text-3xl text-white"></i>

  </div>

                                                      itemsPerPage: pageSize(),

<app-card [product]="product"></app-card>
}

<pagination-template #p="paginationApi" id="foo" (pageChange)="pageChanged($event)">
  <div class="flex items-center justify-center gap-2 my-8 font-sans">
    
    <button [disabled]="p.isFirstPage()" (click)="p.previous()"
            class="flex items-center justify-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
      <i class="fas fa-chevron-left me-2 text-xs"></i> Previous
    </button>

    <div class="flex items-center gap-1">
      @for (page of p.pages; track page.label) {
        <button (click)="p.setCurrent(page.value)"
                [class]="p.getCurrent() === page.value 
                  ? 'w-10 h-10 flex items-center justify-center rounded-xl bg-emerald-600 text-white font-bold shadow-md scale-110 z-10' 
                  : 'w-10 h-10 flex items-center justify-center rounded-xl border border-gray-100 text-gray-600 hover:border-emerald-600 hover:text-emerald-600 transition-all bg-white'">
          {{ page.label }}
        </button>
      }
    </div>

    <button [disabled]="p.isLastPage()" (click)="p.next()"
            class="flex items-center justify-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-xl hover:bg-emerald-50 hover:text-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
      Next <i class="fas fa-chevron-right ms-2 text-xs"></i>
    </button>
    
  </div>
</pagination-template>
</div>
</section>
